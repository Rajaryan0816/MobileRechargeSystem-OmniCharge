spring.application.name=Api_Gateway
spring.config.import=optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}

# Support for forwarded headers (X-Forwarded-Host, etc.)
server.forward-headers-strategy=FRAMEWORK

# ===== Swagger / SpringDoc OpenAPI =====
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.disable-swagger-default-url=true

# Swagger UI will load each microservice's API spec via Gateway routes.
# The Gateway handles path stripping so /user-service/v3/api-docs maps to USERSERVICE/v3/api-docs.
springdoc.swagger-ui.urls[0].name=User Service
springdoc.swagger-ui.urls[0].url=/user-service/v3/api-docs
springdoc.swagger-ui.urls[1].name=Operator Service
springdoc.swagger-ui.urls[1].url=/operator-service/v3/api-docs
springdoc.swagger-ui.urls[2].name=Recharge Service
springdoc.swagger-ui.urls[2].url=/recharge-service/v3/api-docs
springdoc.swagger-ui.urls[3].name=Payment Service
springdoc.swagger-ui.urls[3].url=/payment-service/v3/api-docs
springdoc.swagger-ui.urls[4].name=Notification Service
springdoc.swagger-ui.urls[4].url=/notification-service/v3/api-docs

# ===== Monitoring & Actuator =====
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true

# ===== Resilience4j / Circuit Breaker =====
# Default configuration for all circuit breakers
resilience4j.circuitbreaker.configs.default.registerHealthIndicator=true
resilience4j.circuitbreaker.configs.default.slidingWindowSize=10
resilience4j.circuitbreaker.configs.default.minimumNumberOfCalls=5
resilience4j.circuitbreaker.configs.default.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.configs.default.waitDurationInOpenState=5s
resilience4j.circuitbreaker.configs.default.failureRateThreshold=50

# Timeout configuration
resilience4j.timelimiter.configs.default.timeoutDuration=5s

# Distributed Tracing (Zipkin)
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans

# Gateway Swagger Proxy Routes (Load Balanced w/ Circuit Breaker)
spring.cloud.gateway.mvc.routes[0].id=user-service-docs
spring.cloud.gateway.mvc.routes[0].uri=lb://USERSERVICE
spring.cloud.gateway.mvc.routes[0].predicates[0]=Path=/user-service/v3/api-docs
spring.cloud.gateway.mvc.routes[0].filters[0]=SetPath=/v3/api-docs
spring.cloud.gateway.mvc.routes[0].filters[1]=CircuitBreaker=userServiceCB,forward:/fallback/user-service

spring.cloud.gateway.mvc.routes[1].id=operator-service-docs
spring.cloud.gateway.mvc.routes[1].uri=lb://OPERATORSERVICE
spring.cloud.gateway.mvc.routes[1].predicates[0]=Path=/operator-service/v3/api-docs
spring.cloud.gateway.mvc.routes[1].filters[0]=SetPath=/v3/api-docs
spring.cloud.gateway.mvc.routes[1].filters[1]=CircuitBreaker=operatorServiceCB,forward:/fallback/operator-service

spring.cloud.gateway.mvc.routes[2].id=recharge-service-docs
spring.cloud.gateway.mvc.routes[2].uri=lb://RECHARGESERVICE
spring.cloud.gateway.mvc.routes[2].predicates[0]=Path=/recharge-service/v3/api-docs
spring.cloud.gateway.mvc.routes[2].filters[0]=SetPath=/v3/api-docs
spring.cloud.gateway.mvc.routes[2].filters[1]=CircuitBreaker=rechargeServiceCB,forward:/fallback/recharge-service

spring.cloud.gateway.mvc.routes[3].id=payment-service-docs
spring.cloud.gateway.mvc.routes[3].uri=lb://PAYMENTSERVICE
spring.cloud.gateway.mvc.routes[3].predicates[0]=Path=/payment-service/v3/api-docs
spring.cloud.gateway.mvc.routes[3].filters[0]=SetPath=/v3/api-docs
spring.cloud.gateway.mvc.routes[3].filters[1]=CircuitBreaker=paymentServiceCB,forward:/fallback/payment-service

spring.cloud.gateway.mvc.routes[4].id=notification-service-docs
spring.cloud.gateway.mvc.routes[4].uri=lb://NOTIFICATIONSERVICE
spring.cloud.gateway.mvc.routes[4].predicates[0]=Path=/notification-service/v3/api-docs
spring.cloud.gateway.mvc.routes[4].filters[0]=SetPath=/v3/api-docs
spring.cloud.gateway.mvc.routes[4].filters[1]=CircuitBreaker=notificationServiceCB,forward:/fallback/notification-service

#---
spring.config.activate.on-profile=docker
eureka.client.serviceUrl.defaultZone=http://eureka-service:8761/eureka/
management.zipkin.tracing.endpoint=http://zipkin:9411/api/v2/spans
